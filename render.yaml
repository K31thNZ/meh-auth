# render.yaml
# Place this in the ROOT of the meh-auth repo.
# Render Dashboard → New → Blueprint → connect K31thNZ/meh-auth

services:
  - type: web
    name: meh-auth
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /ping
    envVars:
      - key: NODE_ENV
        value: production

      # Auto-generated by Render — do not set manually
      - key: SESSION_SECRET
        generateValue: true

      # Set these in Render dashboard after first deploy
      - key: DATABASE_URL
        sync: false

      # The public URL of this service (fill in after first deploy)
      # e.g. https://meh-auth.onrender.com
      # or https://auth.meh-moscow.com when you have a domain
      - key: AUTH_SERVICE_URL
        sync: false

      # Comma-separated list of your frontend URLs
      # e.g. https://events.meh-moscow.com,https://games.meh-moscow.com
      # During development: http://localhost:5173,http://localhost:5174
      - key: ALLOWED_ORIGINS
        sync: false

      # Set to .meh-moscow.com once you have a custom domain
      # Leave blank while using .onrender.com subdomains
      - key: COOKIE_DOMAIN
        sync: false

      # OAuth providers — set when credentials are ready
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: YANDEX_CLIENT_ID
        sync: false
      - key: YANDEX_CLIENT_SECRET
        sync: false

      # Telegram — for Telegram Login Widget on the /login page
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_NAME
        sync: false

      # Apple — uncomment when credentials are ready
      # - key: APPLE_CLIENT_ID
      #   sync: false
      # - key: APPLE_TEAM_ID
      #   sync: false
      # - key: APPLE_KEY_ID
      #   sync: false
      # - key: APPLE_PRIVATE_KEY
      #   sync: false
